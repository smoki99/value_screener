name: CI - Python & JavaScript Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1632ce2b9c1b46180b332d6294 # v4.2.2
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0a5c615913736835eee5cf9b6cfe802e1d6fcf16 # v5.4.0
        with:
          python-version: '${{ matrix.python-version }}'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Python tests with pytest
        run: |
          pytest tests/ -v --tb=short

  javascript-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1632ce2b9c1b46180b332d6294 # v4.2.2
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@e76ffddcdadc26eb4f5cba3361de1581db50c6d9 # v4.4.0
        with:
          node-version: '${{ matrix.node-version }}'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run JavaScript tests with Jest
        run: npm test
